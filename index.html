<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>ml.org</title>
        <link rel="icon" href="data:,">
        <link rel="stylesheet" href="./css/style.css" type="text/css">
        <link rel="stylesheet" href="./css/bulma.min.css" type="text/css">
    </head>
    <body>
        <!-- 外部リンク -->
        <nav class="navbar is-dark org-navbar">
            <div class="navbar-brand org-navbar-brand">
                <div class="navbar-item has-text-white">
                    m.league.org
                </div>
                <!-- リリース前
                <a href="rule.html" class="navbar-item">
                    <span class="icon">
                        <img src="./svg/book.svg">
                    </span>
                </a>
                -->
                <a href="admin.html" class="navbar-item">
                    <span class="icon">
                        <img src="./svg/gear.svg">
                    </span>
                </a>
            </div> <!-- /.navbar-brand -->
        </nav> 
        <section class="section">
            <div class="container">
                <!-- チーム成績 -->
                <div class="columns is-centered">
                    <div class="column is-8">
                        <div class="box">
                            <p class="title has-text-centered is-3">RANKING</p>
                            <p class="subtitle has-text-centered is-5">ランキング</p>
                            <table class="table is-fullwidth is-hoverable" style="font-size: 0.65rem">
                                <thead>
                                    <tr>
                                        <th class="has-text-centered">順位</th>
                                        <th class="has-text-centered">チーム</th>
                                        <th class="has-text-centered">pt</th>
                                        <th class="has-text-centered">差</th>
                                        <th class="has-text-centered">試合数</th>
                                    </tr>
                                </thead>
                                <tbody id="team_data"></tbody>
                            </table>
                        </div> <!-- /.box -->
                    </div> <!-- /.column -->
                </div> <!-- /.columns -->

                <!-- 個人成績 -->
                <div class="columns is-centered">
                    <div class="column is-8">
                        <div class="box">
                            <p class="title has-text-centered is-3">SCORE</p>
                            <p class="subtitle has-text-centered is-5">個人スコア</p>
                            <table class="table is-fullwidth is-hoverable" style="font-size: 0.65rem">
                                <thead>
                                    <tr>
                                        <th class="has-text-centered">順位</th>
                                        <th class="has-text-centered">選手名</th>
                                        <th class="has-text-centered">pt</th>
                                        <th class="has-text-centered">差</th>
                                        <th class="has-text-centered">試合数</th>
                                    </tr>
                                </thead>
                                <tbody id="player_data"></tbody>
                            </table>
                        </div> <!-- /.box /.has-background-grey-darker -->
                    </div> <!-- /.column -->
                </div> <!-- ./columns -->
            </div> <!-- /.container -->
        </section> <!-- /.section -->
        <script src="./js/index.js" defer></script>
    </body>
</html>
